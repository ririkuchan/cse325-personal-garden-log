# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - cse325-garden-log-ririku

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Build with dotnet
        # パスを「cse325-garden-log-blazor/cse325-garden-log-blazor/」に変更
        run: dotnet build cse325-garden-log-blazor/cse325-garden-log-blazor/cse325-garden-log-blazor.csproj --configuration Release

      - name: dotnet publish
        # こちらも同様に変更
        run: dotnet publish cse325-garden-log-blazor/cse325-garden-log-blazor/cse325-garden-log-blazor.csproj -c Release -o "${{env.DOTNET_ROOT}}/myapp"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_9E4C00407C36405599974EFA8DE266FA }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_69F09A14A9134ACFB4C656F7444CD7E9 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_7EB031D9475F4D35B2094E16FC50FD34 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'cse325-garden-log-ririku'
          slot-name: 'Production'
          package: .
